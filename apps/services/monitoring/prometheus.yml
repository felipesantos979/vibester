global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Métricas do host (CPU, memória, disco, rede da VPS)
  - job_name: "node_exporter"
    static_configs:
      - targets: ["node_exporter:9100"]

  # Estado dos recursos do cluster (Deployments, Pods, Services, etc.)
  - job_name: "kube-state-metrics"
    static_configs:
      - targets: ["72.62.141.79:30808"]
    metric_relabel_configs:
      - source_labels: [namespace]
        action: replace
        target_label: kubernetes_namespace

  # Métricas do kubelet (saúde dos nodes k8s)
  - job_name: "kubernetes-nodes"
    scheme: https
    metrics_path: /metrics
    tls_config:
      insecure_skip_verify: true
    bearer_token_file: /etc/prometheus/secrets/k8s-token
    static_configs:
      - targets: ["72.62.141.79:10250"]
        labels:
          node: "srv1266734"

  # Métricas de CPU/memória/rede por pod (cAdvisor embutido no kubelet)
  - job_name: "kubernetes-cadvisor"
    scheme: https
    metrics_path: /metrics/cadvisor
    tls_config:
      insecure_skip_verify: true
    bearer_token_file: /etc/prometheus/secrets/k8s-token
    static_configs:
      - targets: ["72.62.141.79:10250"]
        labels:
          node: "srv1266734"
    metric_relabel_configs:
      # Manter apenas métricas de containers com nome de pod (filtra overhead)
      - source_labels: [pod]
        regex: ".+"
        action: keep

  # API Server do Kubernetes
  - job_name: "kubernetes-apiserver"
    scheme: https
    metrics_path: /metrics
    tls_config:
      insecure_skip_verify: true
    bearer_token_file: /etc/prometheus/secrets/k8s-token
    static_configs:
      - targets: ["72.62.141.79:6443"]

  # Auto-descoberta de pods com anotação prometheus.io/scrape: "true"
  # Usa o proxy da API do k8s para alcançar pods (necessário quando Prometheus está fora do cluster)
  # Para habilitar scraping em um serviço, adicione as anotações no deployment:
  #   prometheus.io/scrape: "true"
  #   prometheus.io/port: "3001"
  #   prometheus.io/path: "/metrics"
  - job_name: "kubernetes-pods"
    scheme: https
    tls_config:
      insecure_skip_verify: true
    bearer_token_file: /etc/prometheus/secrets/k8s-token
    kubernetes_sd_configs:
      - api_server: "https://72.62.141.79:6443"
        role: pod
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /etc/prometheus/secrets/k8s-token
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      # Determinar o path de métricas (padrão: /metrics)
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        regex: (.+)
        target_label: __metrics_path__
        replacement: $1
      # Construir URL via proxy da API do k8s para alcançar pods dentro do cluster
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_name, __meta_kubernetes_pod_annotation_prometheus_io_port, __metrics_path__]
        regex: (.+);(.+);(\d+);(.+)
        replacement: /api/v1/namespaces/$1/pods/$2:$3/proxy$4
        target_label: __metrics_path__
      - replacement: "72.62.141.79:6443"
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_container_name]
        action: replace
        target_label: container
      - source_labels: [__meta_kubernetes_pod_node_name]
        action: replace
        target_label: node
