apiVersion: apps/v1
kind: Deployment
metadata:
  name: establishment-service
  namespace: default
  labels:
    app: establishment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: establishment-service
  template:
    metadata:
      labels:
        app: establishment-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: establishment-service
          image: ghcr.io/felipesantos979/vibester-establishment-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          envFrom:
            - secretRef:
                name: establishment-service-secret
            - configMapRef:
                name: redis-env
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 45
            periodSeconds: 30
            failureThreshold: 3
