apiVersion: apps/v1
kind: Deployment
metadata:
  name: feed-service
  namespace: default
  labels:
    app: feed-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: feed-service
  template:
    metadata:
      labels:
        app: feed-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: feed-service
          image: ghcr.io/felipesantos979/vibester-feed-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3006
          envFrom:
            - secretRef:
                name: feed-service-secret
          volumeMounts:
            - name: astra-bundle
              mountPath: /secure-connect
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: astra-bundle
          secret:
            secretName: astra-bundle
