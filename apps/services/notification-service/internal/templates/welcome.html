<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Bem-vindo ao Vibester</title>
</head>

<body style="
  font-family: Arial;
  background-color: #f5f5f5;
  padding: 40px;
">

  <div style="
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 12px;
  ">

    <h1>🎉 Bem-vindo ao Vibester</h1>

    <p>Olá, {{.Name}}</p>

    <p>
      Sua conta foi criada com sucesso.
    </p>

    <p>
      Agora você pode descobrir eventos, experiências
      e conectar-se com pessoas incríveis.
    </p>

    <a
      href="{{.PlatformLink}}"
      style="
        display: inline-block;
        margin-top: 20px;
        background: black;
        color: white;
        padding: 14px 24px;
        text-decoration: none;
        border-radius: 8px;
      "
    >
      Acessar Vibester
    </a>

  </div>

</body>
</html>
