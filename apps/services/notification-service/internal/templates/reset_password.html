<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Recuperação de Senha</title>
</head>

<body style="font-family: Arial; background-color: #f4f4f4; padding: 40px;">

  <div style="
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 10px;
  ">

    <h1>Recuperação de senha</h1>

    <p>Olá, {{.Name}}</p>

    <p>
      Recebemos uma solicitação para redefinir sua senha.
    </p>

    <a
      href="{{.ResetLink}}"
      style="
        display: inline-block;
        margin-top: 20px;
        background: black;
        color: white;
        padding: 14px 24px;
        text-decoration: none;
        border-radius: 8px;
      "
    >
      Redefinir senha
    </a>

    <p style="margin-top: 30px;">
      Caso você não tenha solicitado isso, ignore este email.
    </p>

  </div>

</body>
</html>
