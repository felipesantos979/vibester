<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Autenticação em Dois Fatores</title>
</head>

<body style="
  font-family: Arial;
  background-color: #f4f4f4;
  padding: 40px;
">

  <div style="
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 12px;
    text-align: center;
  ">

    <h1>🔐 Código de verificação</h1>

    <p>Olá, {{.Name}}</p>

    <p>
      Utilize o código abaixo para concluir sua autenticação:
    </p>

    <div style="
      font-size: 42px;
      font-weight: bold;
      letter-spacing: 10px;
      margin: 30px 0;
    ">
      {{.Code}}
    </div>

    <p>
      Este código expira em 5 minutos.
    </p>

  </div>

</body>
</html>
