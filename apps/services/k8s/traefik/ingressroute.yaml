# IngressRoute HTTPS — roteia as requisições de api.vibester.com.br para os serviços internos.
# TLS gerenciado automaticamente pelo certResolver "letsencrypt" configurado no Traefik.

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vibester-api-tls
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`api.vibester.com.br`) && PathPrefix(`/auth`)
      kind: Rule
      middlewares:
        - name: strip-auth-prefix
          namespace: default
      services:
        - name: auth-service
          port: 3001

    - match: Host(`api.vibester.com.br`) && PathPrefix(`/user`)
      kind: Rule
      middlewares:
        - name: strip-user-prefix
          namespace: default
      services:
        - name: user-service
          port: 3003

    - match: Host(`api.vibester.com.br`) && PathPrefix(`/establishment`)
      kind: Rule
      middlewares:
        - name: strip-establishment-prefix
          namespace: default
      services:
        - name: establishment-service
          port: 3002

    - match: Host(`api.vibester.com.br`) && PathPrefix(`/event`)
      kind: Rule
      middlewares:
        - name: strip-event-prefix
          namespace: default
      services:
        - name: event-service
          port: 3334

    - match: Host(`api.vibester.com.br`) && PathPrefix(`/post`)
      kind: Rule
      middlewares:
        - name: strip-post-prefix
          namespace: default
      services:
        - name: post-service
          port: 3000

    - match: Host(`api.vibester.com.br`) && PathPrefix(`/payment`)
      kind: Rule
      middlewares:
        - name: strip-payment-prefix
          namespace: default
      services:
        - name: payment-service
          port: 8080

    - match: Host(`api.vibester.com.br`) && PathPrefix(`/scrapping`)
      kind: Rule
      middlewares:
        - name: strip-scrapping-prefix
          namespace: default
      services:
        - name: scrapping-service
          port: 3000

    - match: Host(`api.vibester.com.br`) && PathPrefix(`/feed`)
      kind: Rule
      middlewares:
        - name: strip-feed-prefix
          namespace: default
      services:
        - name: feed-service
          port: 3006

    - match: Host(`api.vibester.com.br`) && PathPrefix(`/docs`)
      kind: Rule
      services:
        - name: swagger-ui
          port: 8080

  tls:
    certResolver: letsencrypt

---
# IngressRoute HTTPS — roteia requisições de vibester.com.br para a landing page.

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vibester-landing-tls
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`vibester.com.br`) || Host(`www.vibester.com.br`)
      kind: Rule
      services:
        - name: landing-page
          port: 3000
  tls:
    certResolver: letsencrypt

---
# IngressRoute HTTP — redireciona todo tráfego na porta 80 para HTTPS.

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vibester-api-redirect
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`api.vibester.com.br`)
      kind: Rule
      middlewares:
        - name: redirect-to-https
          namespace: gateway
      services:
        # Serviço placeholder exigido pelo CRD; o middleware redireciona antes de chegar aqui.
        - name: auth-service
          port: 3001
