apiVersion: apps/v1
kind: Deployment
metadata:
  name: swagger-ui
  namespace: default
  labels:
    app: swagger-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swagger-ui
  template:
    metadata:
      labels:
        app: swagger-ui
    spec:
      containers:
        - name: swagger-ui
          image: swaggerapi/swagger-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SWAGGER_JSON
              value: /etc/swagger/openapi.json
            - name: BASE_URL
              value: /docs
          volumeMounts:
            - name: swagger-spec
              mountPath: /etc/swagger
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /docs/
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs/
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: swagger-spec
          configMap:
            name: swagger-ui-spec
