apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: default
  labels:
    app: user-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: user-service
          image: ghcr.io/felipesantos979/vibester-user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
          command: ["node", "--max-old-space-size=384", "--require", "./dist/config/tracing.js", "dist/server.js"]
          envFrom:
            - secretRef:
                name: user-service-secret
            - configMapRef:
                name: redis-env
          env:
            - name: KAFKAJS_NO_PARTITIONER_WARNING
              value: "1"
            # Defina OTEL_EXPORTER_OTLP_ENDPOINT para ativar distributed tracing (ex: http://jaeger:4318)
            # - name: OTEL_EXPORTER_OTLP_ENDPOINT
            #   value: "http://jaeger-collector:4318"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
