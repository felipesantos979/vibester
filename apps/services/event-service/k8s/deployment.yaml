apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: default
  labels:
    app: event-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: event-service
          image: ghcr.io/felipesantos979/vibester-event-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3334
          envFrom:
            - secretRef:
                name: event-service-secret
            - configMapRef:
                name: redis-env
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3334
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3334
            initialDelaySeconds: 20
            periodSeconds: 30
