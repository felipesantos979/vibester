apiVersion: v1
kind: Service
metadata:
  name: event-service
  namespace: default
  labels:
    app: event-service
spec:
  type: ClusterIP
  selector:
    app: event-service
  ports:
    - protocol: TCP
      port: 3334
      targetPort: 3334
---
apiVersion: v1
kind: Service
metadata:
  name: event-db
  namespace: default
  labels:
    app: event-db
spec:
  type: ClusterIP
  selector:
    app: event-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
