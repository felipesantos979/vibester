apiVersion: v1
kind: Service
metadata:
  name: scrapping-service
  namespace: default
spec:
  selector:
    app: scrapping-service
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: scrapping-db
  namespace: default
spec:
  selector:
    app: scrapping-db
  ports:
    - port: 5432
      targetPort: 5432
