apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrapping-service
  namespace: default
  labels:
    app: scrapping-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: scrapping-service
  template:
    metadata:
      labels:
        app: scrapping-service
    spec:
      terminationGracePeriodSeconds: 60
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: scrapping-service
          image: ghcr.io/felipesantos979/vibester-scrapping-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: scrapping-service-secret
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
