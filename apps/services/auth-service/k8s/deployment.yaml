apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: default
  labels:
    app: auth-service
  annotations:
    prometheus.io/scrape: "false"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: auth-service
          image: ghcr.io/felipesantos979/vibester-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PROFILE_SERVICE_URL
              value: "http://user-service:3003"
            - name: CORS_ORIGIN
              value: "https://vibester.app"
            - name: FETCH_TIMEOUT_MS
              value: "5000"
            - name: RATE_LIMIT_MAX
              value: "60"
            - name: EMAIL_VERIFICATION_TTL_SECONDS
              value: "600"
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: redis-env
                  key: REDIS_URL
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-env
                  key: KAFKA_BROKERS
          envFrom:
            - secretRef:
                name: auth-db-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
