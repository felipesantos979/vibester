apiVersion: apps/v1
kind: Deployment
metadata:
  name: post-service
  namespace: default
  labels:
    app: post-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: post-service
  template:
    metadata:
      labels:
        app: post-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      terminationGracePeriodSeconds: 60
      volumes:
        - name: astra-bundle
          secret:
            secretName: astra-secure-connect-bundle
      containers:
        - name: post-service
          image: ghcr.io/felipesantos979/vibester-post-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: post-service-secret
            - configMapRef:
                name: redis-env
          env:
            - name: ASTRA_SECURE_CONNECT_BUNDLE
              value: /etc/astra/secure-connect-bundle.zip
          volumeMounts:
            - name: astra-bundle
              mountPath: /etc/astra
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
