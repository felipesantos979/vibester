apiVersion: apps/v1
kind: Deployment
metadata:
  name: post-service
  namespace: default
  labels:
    app: post-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: post-service
  template:
    metadata:
      labels:
        app: post-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      volumes:
        - name: astra-bundle
          secret:
            secretName: astra-secure-connect-bundle
      containers:
        - name: post-service
          image: ghcr.io/felipesantos979/vibester-post-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: post-service-secret
            - configMapRef:
                name: redis-env
          env:
            - name: ASTRA_SECURE_CONNECT_BUNDLE
              value: /etc/astra/secure-connect-bundle.zip
          volumeMounts:
            - name: astra-bundle
              mountPath: /etc/astra
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
