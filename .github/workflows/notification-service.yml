name: notification-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/services/notification-service/**"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vibester-notification-service

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/services/notification-service/go.mod
          cache-dependency-path: apps/services/notification-service/go.sum

      - name: Download dependencies
        working-directory: apps/services/notification-service
        run: go mod download

      - name: Run unit tests
        working-directory: apps/services/notification-service
        run: go test ./...

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: notification_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/services/notification-service/go.mod
          cache-dependency-path: apps/services/notification-service/go.sum

      - name: Download dependencies
        working-directory: apps/services/notification-service
        run: go mod download

      - name: Run integration tests
        working-directory: apps/services/notification-service
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: notification_test
        run: go test -v -tags=integration -timeout=60s ./internal/handlers/... ./internal/repository/... ./internal/database/... ./internal/service/...

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: integration-test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: apps/services/notification-service
          file: apps/services/notification-service/docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.VPS_KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy
        run: |
          kubectl set image deployment/notification-service \
            notification-service=ghcr.io/${{ github.repository_owner }}/vibester-notification-service:${{ github.sha }}
          kubectl rollout status deployment/notification-service --timeout=300s || {
            echo "--- Pod describe ---"
            kubectl describe pod -l app=notification-service
            echo "--- Pod logs ---"
            kubectl logs -l app=notification-service --tail=50 --previous 2>/dev/null || kubectl logs -l app=notification-service --tail=50
            exit 1
          }
