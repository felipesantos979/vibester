name: payment-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/services/payment-service/**"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vibester-payment-service

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/services/payment-service/go.mod
          cache-dependency-path: apps/services/payment-service/go.sum

      - name: Build
        working-directory: apps/services/payment-service
        run: go build ./...

      - name: Test
        working-directory: apps/services/payment-service
        run: go test ./...

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: apps/services/payment-service
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.VPS_KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy
        run: |
          kubectl set image deployment/payment-service \
            payment-service=ghcr.io/${{ github.repository_owner }}/vibester-payment-service:${{ github.sha }}
          kubectl rollout status deployment/payment-service --timeout=120s
