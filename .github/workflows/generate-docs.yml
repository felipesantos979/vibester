name: Generate API Docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/services/**/src/**"
      - "apps/services/scripts/merge-docs.ts"
      - "apps/services/payment-service/openapi-partial.json"

jobs:
  generate:
    name: Generate openapi.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies (all services)
        working-directory: apps/services
        env:
          DATABASE_URL: postgresql://u:p@localhost:5432/db
        run: |
          set -e
          for s in auth-service establishment-service event-service feed-service post-service scrapping-service user-service; do
            echo "Installing $s..."
            (cd "$s" && npm install)
          done

      - name: Generate combined OpenAPI spec
        working-directory: apps/services
        run: node auth-service/node_modules/.bin/tsx scripts/merge-docs.ts

      - name: Upload openapi.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-${{ github.sha }}
          path: apps/services/openapi.json
          retention-days: 90

  deploy-docs:
    name: Update Swagger UI on cluster
    runs-on: ubuntu-latest
    needs: generate

    steps:
      - name: Download openapi.json artifact
        uses: actions/download-artifact@v4
        with:
          name: openapi-${{ github.sha }}
          path: apps/services

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.VPS_KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update ConfigMap and restart Swagger UI
        run: |
          kubectl create configmap swagger-ui-spec \
            --from-file=openapi.json=apps/services/openapi.json \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl rollout restart deployment/swagger-ui
          kubectl rollout status deployment/swagger-ui --timeout=120s
