name: auth-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/services/auth-service/**"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vibester-auth-service

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/services/auth-service/package-lock.json

      - name: Install dependencies
        working-directory: apps/services/auth-service
        env:
          DATABASE_URL: postgresql://u:p@localhost:5432/db
        run: npm install

      - name: Run unit tests
        working-directory: apps/services/auth-service
        run: npm test

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: auth_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/services/auth-service/package-lock.json

      - name: Install dependencies
        working-directory: apps/services/auth-service
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/auth_test_db
        run: npm install

      - name: Run migrations
        working-directory: apps/services/auth-service
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/auth_test_db
        run: npx prisma migrate deploy

      - name: Run integration tests
        working-directory: apps/services/auth-service
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/auth_test_db
          JWT_SECRET: ci-test-secret
          PROFILE_SERVICE_URL: http://localhost:3003
          KAFKA_BROKERS: localhost:9092
          REDIS_URL: redis://localhost:6379
        run: npm run test:integration

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: integration-test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: apps/services/auth-service
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy k8s manifests to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "apps/services/auth-service/k8s"
          target: "/tmp/vibester-auth-service"
          strip_components: 3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            kubectl apply -f /tmp/vibester-auth-service/k8s/
            kubectl set image deployment/auth-service \
              auth-service=ghcr.io/${{ github.repository_owner }}/vibester-auth-service:${{ github.sha }}
            kubectl rollout status deployment/auth-service --timeout=300s || {
              echo "--- Pod describe ---"
              kubectl describe pod -l app=auth-service
              echo "--- Pod logs ---"
              kubectl logs -l app=auth-service --tail=50 --previous 2>/dev/null || kubectl logs -l app=auth-service --tail=50
              exit 1
            }
