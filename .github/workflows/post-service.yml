name: post-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/services/post-service/**"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vibester-post-service

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/services/post-service/package-lock.json

      - name: Install dependencies
        working-directory: apps/services/post-service
        run: npm install

      - name: Run unit tests
        working-directory: apps/services/post-service
        run: npm run test:unit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/services/post-service/package-lock.json

      - name: Install dependencies
        working-directory: apps/services/post-service
        run: npm install

      - name: Start test services (Redis)
        working-directory: apps/services/post-service
        run: docker compose -f docker-compose.test.yml up -d --wait
        timeout-minutes: 2

      - name: Run integration tests
        working-directory: apps/services/post-service
        run: npm run test:integration
        env:
          REDIS_URL: redis://localhost:6379

      - name: Stop test services
        if: always()
        working-directory: apps/services/post-service
        run: docker compose -f docker-compose.test.yml down -v

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: apps/services/post-service
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.VPS_KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy
        run: |
          kubectl set image deployment/post-service \
            post-service=ghcr.io/${{ github.repository_owner }}/vibester-post-service:${{ github.sha }}
          kubectl rollout status deployment/post-service --timeout=300s || {
            echo "--- Pod describe ---"
            kubectl describe pod -l app=post-service
            echo "--- Pod logs ---"
            kubectl logs -l app=post-service --tail=100 --previous 2>/dev/null || kubectl logs -l app=post-service --tail=100
            exit 1
          }
