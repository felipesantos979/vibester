name: scrapping-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/services/scrapping-service/**"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vibester-scrapping-service

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: apps/services/scrapping-service/package-lock.json

      - name: Install dependencies
        working-directory: apps/services/scrapping-service
        env:
          DATABASE_URL: postgresql://u:p@localhost:5432/db
        run: npm ci

      - name: Run unit tests
        working-directory: apps/services/scrapping-service
        run: npm test

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: "apps/services/scrapping-service"
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.VPS_KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy
        run: |
          kubectl set image deployment/scrapping-service \
            scrapping-service=ghcr.io/${{ github.repository_owner }}/vibester-scrapping-service:${{ github.sha }}
          kubectl rollout status deployment/scrapping-service --timeout=120s
