name: scrapping-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/services/scrapping-service/**"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vibester-scrapping-service

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: "apps/services/scrapping-service"
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            kubectl set image deployment/scrapping-service \
              scrapping-service=ghcr.io/${{ github.repository_owner }}/vibester-scrapping-service:${{ github.sha }}
            kubectl rollout status deployment/scrapping-service --timeout=120s
