name: user-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/services/user-service/**"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vibester-user-service

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/services/user-service/package-lock.json

      - name: Install dependencies
        working-directory: apps/services/user-service
        env:
          DATABASE_URL: postgresql://u:p@localhost:5432/db
        run: npm install

      - name: Run unit tests
        working-directory: apps/services/user-service
        run: npm test

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: apps/services/user-service
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            kubectl set image deployment/user-service \
              user-service=ghcr.io/${{ github.repository_owner }}/vibester-user-service:${{ github.sha }}
            kubectl rollout status deployment/user-service --timeout=120s
