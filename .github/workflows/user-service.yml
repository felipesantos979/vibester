name: user-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/services/user-service/**"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vibester-user-service

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/services/user-service/package-lock.json

      - name: Install dependencies
        working-directory: apps/services/user-service
        env:
          DATABASE_URL: postgresql://u:p@localhost:5432/db
        run: npm install

      - name: Run unit tests
        working-directory: apps/services/user-service
        run: npm test

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: user_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/services/user-service/package-lock.json

      - name: Install dependencies
        working-directory: apps/services/user-service
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/user_test_db
        run: npm install

      - name: Run migrations
        working-directory: apps/services/user-service
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/user_test_db
        run: npx prisma migrate deploy

      - name: Run integration tests
        working-directory: apps/services/user-service
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/user_test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret
          PROFILE_SERVICE_URL: http://localhost:3003
          KAFKA_BROKERS: localhost:9092
        run: npm run test:integration

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: integration-test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: apps/services/user-service
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.VPS_KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy
        run: |
          kubectl set image deployment/user-service \
            user-service=ghcr.io/${{ github.repository_owner }}/vibester-user-service:${{ github.sha }}
          kubectl rollout status deployment/user-service --timeout=120s
