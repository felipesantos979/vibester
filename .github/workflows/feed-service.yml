name: feed-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/services/feed-service/**"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vibester-feed-service

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/services/feed-service/package-lock.json

      - name: Install dependencies
        working-directory: apps/services/feed-service
        run: npm install

      - name: Run integration tests
        working-directory: apps/services/feed-service
        run: npm test

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: apps/services/feed-service
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            kubectl set image deployment/feed-service \
              feed-service=ghcr.io/${{ github.repository_owner }}/vibester-feed-service:${{ github.sha }}
            kubectl rollout status deployment/feed-service --timeout=300s || {
              echo "--- Pod describe ---"
              kubectl describe pod -l app=feed-service
              echo "--- Pod logs ---"
              kubectl logs -l app=feed-service --tail=50 --previous 2>/dev/null || kubectl logs -l app=feed-service --tail=50
              exit 1
            }
