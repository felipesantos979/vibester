name: event-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/services/event-service/**"
      - ".github/workflows/event-service.yml"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vibester-event-service

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: apps/services/event-service/package-lock.json

      - name: Install dependencies
        working-directory: apps/services/event-service
        env:
          DATABASE_URL: postgresql://u:p@localhost:5432/db
        run: npm ci

      - name: Type check
        working-directory: apps/services/event-service
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: apps/services/event-service
        env:
          JWT_SECRET: ci-test-secret
          DATABASE_URL: postgresql://u:p@localhost:5432/db
        run: npx vitest run src

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: apps/services/event-service/package-lock.json

      - name: Install dependencies
        working-directory: apps/services/event-service
        env:
          DATABASE_URL: postgresql://u:p@localhost:5432/db
        run: npm ci

      - name: Run integration tests with coverage
        working-directory: apps/services/event-service
        env:
          JWT_SECRET: ci-test-secret
          DATABASE_URL: postgresql://u:p@localhost:5432/db
        run: npm run test:coverage

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: integration-test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: apps/services/event-service
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.VPS_KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy
        run: |
          kubectl set image deployment/event-service \
            event-service=ghcr.io/${{ github.repository_owner }}/vibester-event-service:${{ github.sha }}
          kubectl rollout status deployment/event-service --timeout=300s || {
            echo "--- Pod describe ---"
            kubectl describe pod -l app=event-service
            echo "--- Pod logs ---"
            kubectl logs -l app=event-service --tail=50 --previous 2>/dev/null || kubectl logs -l app=event-service --tail=50
            exit 1
          }
