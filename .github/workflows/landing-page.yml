name: landing-page CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/landing-page/**"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vibester-landing-page

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: apps/landing-page
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.VPS_KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy
        run: |
          kubectl set image deployment/landing-page \
            landing-page=ghcr.io/${{ github.repository_owner }}/vibester-landing-page:${{ github.sha }}
          kubectl rollout status deployment/landing-page --timeout=300s || {
            echo "--- Pod describe ---"
            kubectl describe pod -l app=landing-page
            echo "--- Pod logs ---"
            kubectl logs -l app=landing-page --tail=50 --previous 2>/dev/null || kubectl logs -l app=landing-page --tail=50
            exit 1
          }
